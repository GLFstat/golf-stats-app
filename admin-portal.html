<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stracker Admin Portal</title>
  <link rel="stylesheet" href="admin-portal.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="portal-shell">

    <header class="portal-header">
  <div class="header-overlay">

  <div class="header-left">
    <img src="images/Stracker-header-2.png" alt="Stracker Logo" class="header-logo" />
  </div>

  <div class="header-right">
    <div class="header-subtitle">Admin Portal</div>
    <button id="logoutBtn" class="header-btn" type="button">Logout</button>
  </div>

</div>
    </header>

    <main class="portal-main">
      <section class="portal-grid">

        <div class="portal-card live-card">
          <div class="card-header">
            <h2>Live Round</h2>
            <div class="card-header-actions">
              <button id="refreshBtn" class="icon-btn" type="button" title="Refresh">↻</button>
            </div>
          </div>

          <div id="roundDetails" class="live-round-content empty">
            Select a round to view details
          </div>
        </div>

        <div class="portal-card completed-card">
          <div class="card-header">
            <h2>Completed Rounds</h2>
          </div>

          <div id="liveRoundsList" class="completed-rounds-list">
            Loading...
          </div>
        </div>

        <div class="portal-card maintenance-card">
          <div class="card-header">
            <h2>Maintenance</h2>
          </div>

          <div class="maintenance-actions">
            <button id="clearFinishedBtn" class="action-btn gold-btn" type="button">
              Delete All Test Rounds
            </button>

            <button id="clearLiveBtn" class="action-btn gray-btn" type="button">
              Clear Live Round Snapshot
            </button>
          </div>

          <div id="maintenanceStats" class="maintenance-stats">
            Records: --
          </div>
        </div>

      </section>
    </main>

  </div>

  <script src="js/admin-portal.js"></script>
</body>
</html>
